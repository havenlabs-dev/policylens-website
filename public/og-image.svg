<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0F1B2D"/>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(20,184,166,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Logo mark -->
  <rect x="80" y="72" width="52" height="52" rx="10" fill="#14B8A6"/>
  <path d="M91 85h30v4H91zm0 9h21v4H91zm0 9h26v4H91zm0 9h16v4H91z" fill="white"/>
  <!-- PolicyLens wordmark -->
  <text x="146" y="109" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="700" fill="white">PolicyLens</text>
  <!-- Headline -->
  <text x="80" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="700" fill="white">See policy</text>
  <text x="80" y="374" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="700" fill="#14B8A6">clearly.</text>
  <!-- Subtext -->
  <text x="80" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="26" fill="rgba(255,255,255,0.5)">Secure AI document assistant. Cited answers.</text>
  <text x="80" y="474" font-family="system-ui,-apple-system,sans-serif" font-size="26" fill="rgba(255,255,255,0.5)">Three deployment tiers.</text>
  <!-- Right: mock card -->
  <rect x="740" y="100" width="380" height="290" rx="14" fill="rgba(23,34,54,0.9)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Doc header -->
  <rect x="764" y="124" width="32" height="32" rx="8" fill="rgba(20,184,166,0.12)"/>
  <path d="M771 132h18M771 138h14M771 144h16" stroke="#14B8A6" stroke-width="1.5" stroke-linecap="round"/>
  <text x="806" y="137" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.8)">Employee Handbook v3.2</text>
  <text x="806" y="153" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Section 4 — Remote Work Policy</text>
  <!-- Query -->
  <rect x="764" y="170" width="332" height="54" rx="8" fill="rgba(30,45,69,0.8)" stroke="rgba(20,184,166,0.18)" stroke-width="1"/>
  <text x="780" y="188" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">Query</text>
  <text x="780" y="208" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">What is the remote work equipment policy?</text>
  <!-- Answer -->
  <rect x="764" y="236" width="332" height="80" rx="8" fill="rgba(20,184,166,0.05)" stroke="rgba(20,184,166,0.15)" stroke-width="1"/>
  <text x="780" y="254" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#14B8A6">Answer</text>
  <text x="780" y="274" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Employees are eligible for up to $500/year</text>
  <text x="780" y="292" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">in equipment reimbursement.</text>
  <!-- Citation -->
  <rect x="764" y="328" width="3" height="42" rx="2" fill="rgba(20,184,166,0.45)"/>
  <text x="774" y="344" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Source citation</text>
  <text x="774" y="362" font-family="system-ui,sans-serif" font-size="11" fill="rgba(20,184,166,0.75)">Employee Handbook v3.2 — Sec. 4.3, p.18</text>
  <!-- Confidence badge -->
  <rect x="1002" y="84" width="138" height="28" rx="14" fill="#172236" stroke="rgba(20,184,166,0.35)" stroke-width="1"/>
  <text x="1071" y="103" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#14B8A6" text-anchor="middle">High confidence</text>
  <!-- Bottom domain -->
  <text x="80" y="578" font-family="system-ui,sans-serif" font-size="18" fill="rgba(255,255,255,0.2)">havenlabs.io · PolicyLens</text>
</svg>
